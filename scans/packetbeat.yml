packetbeat.interfaces.device: eth1

packetbeat.flows:
  timeout: 30s
  period: 10s

packetbeat.protocols:
- type: dns
  ports: [53]
- type: http
  ports: [80, 8080]
- type: tls
  ports: [443]

packetbeat.interfaces.snaplen: 1514

output.elasticsearch:
  hosts: ["elasticsearch:9200"]

setup.kibana:
  host: "kibana:5601"

logging.level: info
logging.to_files: true
logging.files:
  path: /tmp
  name: packetbeat.log
